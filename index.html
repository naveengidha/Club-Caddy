<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Club Caddy"/>
<meta name="theme-color" content="#1a3a2a"/>
<title>Club Caddy</title>
<style>
:root {
  --bg:        #0f2318;
  --surface:   #1a3a2a;
  --surface2:  #234d39;
  --border:    #2d6348;
  --accent:    #4ade80;
  --text:      #f0fdf4;
  --muted:     #86efac;
  --error:     #f87171;
  --locked:    #fbbf24;
  --danger:    #ef4444;
  --safe-t:    env(safe-area-inset-top, 0px);
  --safe-b:    env(safe-area-inset-bottom, 0px);
  --tab-h:     50px;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
input,button{font:inherit}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
#content{flex:1;overflow-y:auto;padding-bottom:calc(var(--tab-h) + var(--safe-b));display:flex;flex-direction:column}

/* ── Tab bar ── */
#tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  height:calc(var(--tab-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  display:flex;background:var(--surface);border-top:1px solid var(--border);z-index:100
}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--muted);cursor:pointer;padding:5px 4px;transition:color .15s;min-height:44px}
.tab-btn.active{color:#f59e0b}
.tab-btn svg{width:18px;height:18px}
.tab-label{font-size:.58rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase}

/* ── Screen ── */
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}
.screen-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  height:44px;
  flex-shrink:0;
  border-bottom:1px solid var(--border)
}
.btn-ghost{background:none;color:var(--muted);border:none;border-radius:var(--r-sm);padding:8px 12px;font-size:1.1rem;cursor:pointer;height:44px;width:44px}

/* ── Conditions bar ── */
#conditions-bar{padding:8px 16px;padding-top:calc(8px + var(--safe-t));background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px}
.cond-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;min-width:32px}
.seg-ctrl{display:flex;flex:1;background:var(--bg);border-radius:var(--r-md);padding:2px;gap:2px}
.seg-btn{flex:1;border:none;background:none;color:var(--muted);padding:4px 2px;border-radius:calc(var(--r-md) - 2px);font-size:.7rem;font-weight:600;cursor:pointer;transition:background .15s,color .15s;min-height:28px}
.seg-btn.active{background:var(--surface2);color:var(--accent)}

.screen-title{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}

/* ── Carry table ── */
.carry-table-wrap{flex:1;display:flex;flex-direction:column}
table.carry-table{width:100%;border-collapse:collapse;font-size:.95rem;flex:1}
table.carry-table thead th{padding:6px 12px;text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface)}
table.carry-table thead th.col-base,table.carry-table thead th.col-adj{text-align:right}
table.carry-table tbody{display:table-row-group;height:100%}
table.carry-table tbody tr{border-bottom:1px solid rgba(45,99,72,.4);cursor:pointer;transition:background .1s;height:calc((100% - 1px) / 11)}
table.carry-table tbody tr:hover,table.carry-table tbody tr:active{background:var(--surface2)}
table.carry-table tbody tr.locked .col-club{color:var(--locked)}
table.carry-table td{padding:0 12px}
.col-club{font-weight:600;font-size:.9rem}
.col-base{color:var(--muted);font-size:.82rem;text-align:right;font-variant-numeric:tabular-nums}
.col-adj{font-weight:700;font-size:.95rem;color:var(--accent);text-align:right;font-variant-numeric:tabular-nums}

/* ── Wedge ── */
.wedge-wrap{padding:0;flex:1;display:flex;flex-direction:column}
table.wedge-table{width:100%;border-collapse:collapse;font-size:.95rem;flex:1}
table.wedge-table thead th{padding:6px 12px;text-align:right;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface)}
table.wedge-table thead th:first-child{text-align:left}
table.wedge-table tbody tr{border-bottom:1px solid rgba(45,99,72,.4)}
table.wedge-table td{padding:14px 12px}
.wt-name{font-weight:700;font-size:1rem}
.wt-carry{text-align:right;font-weight:700;font-size:1.2rem;color:var(--accent);font-variant-numeric:tabular-nums}

/* ── Bump & Run ── */
.target-input-row{display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.target-yardage{font-size:2rem;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;min-width:60px;width:72px;text-align:center;background:none;border:none;outline:none;-moz-appearance:textfield}
.target-yardage::-webkit-outer-spin-button,.target-yardage::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.target-unit{font-size:.85rem;font-weight:600;color:var(--muted);align-self:flex-end;padding-bottom:6px}
.target-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
table.target-table{width:100%;border-collapse:collapse;font-size:.95rem;flex:1}
table.target-table thead th{padding:5px 16px;text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface)}
table.target-table thead th:last-child{text-align:right}
table.target-table tbody{display:table-row-group;height:100%}
table.target-table tbody tr{border-bottom:1px solid rgba(45,99,72,.4);height:calc((100% - 1px) / 11)}
table.target-table tbody tr.target-pick{background:rgba(184,148,64,.13)}
table.target-table td{padding:0 16px}
.tt-club{font-weight:600;font-size:.9rem}
.tt-badge{display:inline-block;margin-left:7px;padding:1px 6px;border-radius:4px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;vertical-align:middle}
.tt-badge.full{background:rgba(184,148,64,.3);color:#c9a84c;border:1px solid rgba(184,148,64,.45)}
.tt-badge.flight{background:rgba(184,148,64,.15);color:#b89440;border:1px solid rgba(184,148,64,.3)}
.tt-adj{font-weight:700;font-variant-numeric:tabular-nums}
.tt-diff{text-align:right;font-variant-numeric:tabular-nums;font-size:.85rem}
.tt-diff.over{color:#e06c6c}
.tt-diff.under{color:var(--muted)}

/* ── Modal ── */
#modal-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:flex-end;z-index:200}
#modal-scrim.open{display:flex;animation:fade-in .15s ease}
.modal-sheet{width:100%;max-width:480px;margin:0 auto;background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;border-top:1px solid var(--border);padding:0 0 calc(24px + var(--safe-b));animation:slide-up .2s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:6px 8px;min-width:36px;min-height:36px}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:16px}
.modal-hint{font-size:.85rem;color:var(--muted)}
.stepper-row{display:flex;align-items:center;justify-content:center;gap:10px}
.stepper-btn{width:44px;height:44px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-num-input{width:100px;text-align:right;font-size:2rem;font-weight:700;background:var(--bg);border:2px solid var(--border);border-radius:var(--r-md);color:var(--text);padding:8px 10px;font-variant-numeric:tabular-nums;outline:none}
.modal-num-input:focus{border-color:var(--accent)}
.modal-unit{font-size:1rem;color:var(--muted);font-weight:600}
.modal-actions{display:flex;gap:10px}
.modal-actions>*{flex:1}
.btn-primary{background:var(--accent);color:#0f2318;border:none;border-radius:var(--r-md);padding:12px 16px;font-weight:700;font-size:1rem;cursor:pointer;min-height:44px}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 16px;font-weight:600;font-size:.9rem;cursor:pointer;min-height:44px}
.btn-danger{background:var(--danger);color:#fff;border:none;border-radius:var(--r-md);padding:12px 16px;font-weight:700;font-size:.9rem;cursor:pointer;min-height:44px}

/* ── Setup screen ── */
#setup-screen{display:none;min-height:100vh;background:var(--bg);flex-direction:column;align-items:center;overflow-y:auto;padding:var(--safe-t) 16px var(--safe-b)}
#setup-screen.active{display:flex}
.setup-inner{width:100%;max-width:480px;padding:40px 0;display:flex;flex-direction:column;gap:28px}
.setup-header{text-align:center}
.setup-logo{font-size:3rem;margin-bottom:12px}
.setup-title{font-size:2rem;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
.setup-subtitle{font-size:.95rem;color:var(--muted);line-height:1.5}
.setup-form{background:var(--surface);border-radius:var(--r-lg);padding:20px;display:flex;flex-direction:column;gap:20px;border:1px solid var(--border)}
.anchor-group{display:flex;flex-direction:column;gap:6px}
.anchor-label{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.anchor-row{display:flex;align-items:center;gap:8px}
.anchor-input{flex:1;background:var(--bg);border:2px solid var(--border);border-radius:var(--r-md);color:var(--text);font-size:1.8rem;font-weight:700;padding:10px 14px;text-align:right;font-variant-numeric:tabular-nums;outline:none;max-width:140px}
.anchor-input:focus{border-color:var(--accent)}
.anchor-input.error{border-color:var(--error)}
.anchor-unit{font-size:1rem;color:var(--muted);font-weight:600}
.anchor-error{color:var(--error);font-size:.78rem;min-height:1.2em}
.setup-cta{width:100%;padding:16px}
.bag-preview{background:var(--surface);border-radius:var(--r-lg);padding:16px;border:1px solid var(--border)}
.preview-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
table.preview-table{width:100%;border-collapse:collapse;font-size:.9rem}
table.preview-table th{text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:4px 6px;border-bottom:1px solid var(--border)}
table.preview-table td{padding:6px}
table.preview-table .num{text-align:right;font-variant-numeric:tabular-nums;color:var(--accent)}
table.preview-table tr.dim td{color:var(--muted)}

@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}

</style>
</head>
<body>

<!-- Setup screen -->
<div id="setup-screen">
  <div class="setup-inner">
    <div class="setup-header">
      <div class="setup-logo">⛳</div>
      <h1 class="setup-title">Club Caddy</h1>
      <p class="setup-subtitle">Enter your two anchor clubs and we'll build your full bag.</p>
    </div>
    <div class="setup-form">
      <div class="anchor-group">
        <label class="anchor-label">Driver carry</label>
        <div class="anchor-row">
          <input class="anchor-input" id="input-driver" type="number" inputmode="numeric" placeholder="215" min="1" max="999"/>
          <span class="anchor-unit">yds</span>
        </div>
        <p class="anchor-error" id="err-driver"></p>
      </div>
      <div class="anchor-group">
        <label class="anchor-label">5 Iron carry</label>
        <div class="anchor-row">
          <input class="anchor-input" id="input-5i" type="number" inputmode="numeric" placeholder="160" min="1" max="999"/>
          <span class="anchor-unit">yds</span>
        </div>
        <p class="anchor-error" id="err-5i"></p>
      </div>
    </div>
    <div class="bag-preview">
      <p class="preview-title">Your Bag Preview</p>
      <table class="preview-table">
        <thead><tr><th>Club</th><th class="num">Carry</th></tr></thead>
        <tbody id="preview-body"></tbody>
      </table>
    </div>
    <button class="btn-primary setup-cta" id="btn-start" disabled>Start Playing</button>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none">
  <div id="content">

    <!-- Global conditions bar — visible on all tabs -->
    <div id="conditions-bar">
      <div class="cond-row">
        <span class="bar-label">Air</span>
        <div class="seg-ctrl" id="air-ctrl">
          <button class="seg-btn" data-val="cold">❄ Cold</button>
          <button class="seg-btn active" data-val="normal">Normal</button>
          <button class="seg-btn" data-val="warm">☀ Warm</button>
        </div>
      </div>
      <div class="cond-row">
        <span class="bar-label">Wind</span>
        <div class="seg-ctrl" id="wind-ctrl">
          <button class="seg-btn" data-val="headwind">▼▼ Into</button>
          <button class="seg-btn" data-val="slight-head">▼ Into</button>
          <button class="seg-btn active" data-val="calm">Calm</button>
          <button class="seg-btn" data-val="slight-tail">▲ Down</button>
          <button class="seg-btn" data-val="tailwind">▲▲ Down</button>
        </div>
      </div>
      <div class="cond-row">
        <span class="bar-label">Elev</span>
        <div class="seg-ctrl" id="elev-ctrl">
          <button class="seg-btn" data-val="above">Above</button>
          <button class="seg-btn active" data-val="level">Level</button>
          <button class="seg-btn" data-val="below">Below</button>
        </div>
      </div>
      <div class="cond-row">
        <span class="bar-label">Lie</span>
        <div class="seg-ctrl" id="lie-ctrl">
          <button class="seg-btn" data-val="rough">Rough</button>
          <button class="seg-btn active" data-val="clean">Clean</button>
          <button class="seg-btn" data-val="hardpan">Hardpan</button>
        </div>
      </div>
    </div>

    <!-- Screen 1: Carry Calculator -->
    <div class="screen active" id="screen-calculator">
      <div class="screen-header">
        <h2 class="screen-title">Carry Calculator</h2>
        <button class="btn-ghost" id="btn-settings" title="Reset bag">⚙</button>
      </div>
      <div class="carry-table-wrap">
        <table class="carry-table">
          <thead><tr>
            <th class="col-club">Club</th>
            <th class="col-base">Base</th>
            <th class="col-adj">Adjusted</th>
          </tr></thead>
          <tbody id="carry-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Screen 2: Wedge Matrix -->
    <div class="screen" id="screen-wedge">
      <div class="screen-header">
        <h2 class="screen-title">Wedge Matrix</h2>
      </div>
      <div class="wedge-wrap">
        <table class="wedge-table">
          <thead><tr>
            <th>Club</th>
            <th>Full</th>
            <th>¾</th>
            <th>½</th>
          </tr></thead>
          <tbody id="wedge-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Screen 3: Bump & Run -->
    <div class="screen" id="screen-target">
      <div class="screen-header">
        <h2 class="screen-title">Target Distance</h2>
      </div>
      <div class="target-input-row">
        <button class="stepper-btn" id="target-minus">−</button>
        <input class="target-yardage" id="target-display" type="number" inputmode="numeric" min="1" max="999" value="150"/>
        <span class="target-unit">yds</span>
        <button class="stepper-btn" id="target-plus">+</button>
      </div>
      <div class="target-wrap">
        <table class="target-table">
          <thead><tr>
            <th>Club</th>
            <th>Adjusted</th>
            <th>Diff</th>
          </tr></thead>
          <tbody id="target-body"></tbody>
        </table>
      </div>
    </div>


  </div>

  <!-- Tab bar -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="calculator">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 7h8M8 12h4M8 17h2"/></svg>
      <span class="tab-label">Carry</span>
    </button>
    <button class="tab-btn" data-tab="wedge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20L12 4l8 16H4z"/></svg>
      <span class="tab-label">Wedge</span>
    </button>
    <button class="tab-btn" data-tab="target">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
      <span class="tab-label">Target</span>
    </button>
  </nav>
</div>

<!-- Modal -->
<div id="modal-scrim">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-hint" id="modal-hint"></p>
      <div class="stepper-row" id="modal-stepper-row">
        <button class="stepper-btn" id="btn-minus">−</button>
        <input class="modal-num-input" id="modal-input" type="number" inputmode="numeric" min="1" max="999"/>
        <span class="modal-unit">yds</span>
        <button class="stepper-btn" id="btn-plus">+</button>
      </div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────
const CLUBS = [
  { id:'driver', label:'Driver' },
  { id:'5w',     label:'5 Wood' },
  { id:'4h',     label:'4 Hybrid' },
  { id:'5i',     label:'5 Iron' },
  { id:'6i',     label:'6 Iron' },
  { id:'7i',     label:'7 Iron' },
  { id:'8i',     label:'8 Iron' },
  { id:'9i',     label:'9 Iron' },
  { id:'pw',     label:'PW' },
  { id:'aw',     label:'AW' },
  { id:'sw',     label:'SW' },
];

const SPEC = { driver:215,'5w':198,'4h':183,'5i':160,'6i':145,'7i':135,'8i':125,'9i':110,pw:100,aw:88,sw:72 };

const WEDGE_CLUBS = ['pw','aw','sw'];
const SWING_MULT  = [1.00, 0.83, 0.65];

// Air modifier: cold air is denser, ball flies shorter; warm air is less dense, flies further
const AIR_MOD   = { cold: 0.98, normal: 1.0, warm: 1.02 };

// Wind modifier: headwind reduces carry, tailwind increases it
const WIND_MOD   = { headwind: 0.90, 'slight-head': 0.95, calm: 1.0, 'slight-tail': 1.05, tailwind: 1.10 };

// Target elevation: hitting to a green above/below you changes effective carry needed
const ELEV_MOD  = { above: 1.05, level: 1.0, below: 0.95 };

// Lie: clean contact flies full distance; rough kills spin/speed; hardpan can add distance
const LIE_MOD   = { clean: 1.0, rough: 0.95, hardpan: 1.02 };

// ── State ────────────────────────────────────────────────────────────
const state = {
  isSetupComplete: false,
  anchors: null,
  carries: {},
  locked: {},
  air: 'normal',
  wind: 'calm',
  elev: 'level',
  lie: 'clean',
  targetYds: 150,
};

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('club-caddy-v3') || 'null');
    if (saved) Object.assign(state, saved);
  } catch(e) {}
}

function saveState() {
  const { isSetupComplete, anchors, carries, locked, air, wind, elev, lie, targetYds } = state;
  localStorage.setItem('club-caddy-v3', JSON.stringify({ isSetupComplete, anchors, carries, locked, air, wind, elev, lie, targetYds }));
}

// ── Math ─────────────────────────────────────────────────────────────
function condMod() {
  return AIR_MOD[state.air] * WIND_MOD[state.wind] * ELEV_MOD[state.elev] * LIE_MOD[state.lie];
}

function adjustedCarry(base) {
  return Math.round(base * condMod());
}

function extrapolate(driverCarry, fiveIronCarry) {
  const specGap    = SPEC.driver - SPEC['5i'];
  const userGap    = driverCarry - fiveIronCarry;
  const aboveScale = userGap / specGap;
  const belowScale = fiveIronCarry / SPEC['5i'];
  const result = {};
  CLUBS.forEach(({ id }, i) => {
    if (state.locked[id]) { result[id] = state.carries[id]; return; }
    if (i === 0) { result[id] = driverCarry; return; }
    if (i === 3) { result[id] = fiveIronCarry; return; }
    if (i < 3) {
      result[id] = driverCarry - Math.round((SPEC.driver - SPEC[id]) * aboveScale);
    } else {
      result[id] = fiveIronCarry - Math.round((SPEC['5i'] - SPEC[id]) * belowScale);
    }
  });
  return result;
}

// ── Setup ─────────────────────────────────────────────────────────────
const inputDriver = document.getElementById('input-driver');
const input5i     = document.getElementById('input-5i');
const errDriver   = document.getElementById('err-driver');
const err5i       = document.getElementById('err-5i');
const btnStart    = document.getElementById('btn-start');
const previewBody = document.getElementById('preview-body');

function validateSetup() {
  const d = parseInt(inputDriver.value, 10);
  const f = parseInt(input5i.value, 10);
  const dOk = !isNaN(d) && d > 0;
  const fOk = !isNaN(f) && f > 0;
  const crossOk = dOk && fOk && d > f;

  inputDriver.classList.toggle('error', inputDriver.value && !dOk);
  input5i.classList.toggle('error', input5i.value && (!fOk || (dOk && fOk && d <= f)));
  errDriver.textContent = inputDriver.value && !dOk ? 'Enter a valid yardage' : '';
  err5i.textContent = input5i.value && !fOk ? 'Enter a valid yardage'
    : (fOk && dOk && d <= f) ? 'Must be less than Driver' : '';
  btnStart.disabled = !crossOk;

  const preview = (dOk && fOk) ? extrapolate(d, f) : null;
  previewBody.innerHTML = CLUBS.map(({ id, label }) =>
    `<tr class="${crossOk ? '' : 'dim'}"><td>${label}</td><td class="num">${crossOk ? preview[id] + ' yds' : '—'}</td></tr>`
  ).join('');
}

function initSetupListeners() {
  inputDriver.addEventListener('input', validateSetup);
  input5i.addEventListener('input', validateSetup);
  validateSetup();
  btnStart.addEventListener('click', () => {
    const d = parseInt(inputDriver.value, 10);
    const f = parseInt(input5i.value, 10);
    state.anchors = { driver: d, fiveIron: f };
    state.carries = extrapolate(d, f);
    state.isSetupComplete = true;
    saveState();
    showApp();
  });
}

// ── Render ────────────────────────────────────────────────────────────
function renderCarryTable() {
  const tbody = document.getElementById('carry-body');
  tbody.innerHTML = CLUBS.map(({ id, label }) => {
    const base = state.carries[id] ?? SPEC[id];
    return `<tr class="${state.locked[id] ? 'locked' : ''}" data-id="${id}">
      <td class="col-club">${label}</td>
      <td class="col-base">${base}</td>
      <td class="col-adj">${adjustedCarry(base)}</td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('tr').forEach(row =>
    row.addEventListener('click', () => openClubModal(row.dataset.id))
  );
}

function renderWedge() {
  const m = condMod();
  document.getElementById('wedge-body').innerHTML = WEDGE_CLUBS.map(id => {
    const base = state.carries[id] ?? SPEC[id];
    const cells = SWING_MULT.map(s => `<td class="wt-carry">${Math.round(base * s * m)}</td>`).join('');
    return `<tr><td class="wt-name">${CLUBS.find(c=>c.id===id).label}</td>${cells}</tr>`;
  }).join('');
}

function renderTarget() {
  const t = state.targetYds;
  const input = document.getElementById('target-display');
  if (input && document.activeElement !== input) input.value = t;
  const rows = CLUBS.map(({ id, label }) => {
    const base = state.carries[id] ?? SPEC[id];
    const adj = adjustedCarry(base);
    const diff = adj - t;
    const sign = diff > 0 ? '+' : '';
    const cls = diff > 0 ? 'over' : 'under';
    return { label, adj, diff, sign, cls, absDiff: Math.abs(diff) };
  });

  // "Full" = closest club at or above target (smallest positive diff, or least negative if all under)
  const overRows  = rows.filter(r => r.diff >= 0);
  const fullRow   = overRows.length
    ? overRows.reduce((a, b) => a.diff <= b.diff ? a : b)
    : rows.reduce((a, b) => a.absDiff <= b.absDiff ? a : b);

  // "Flight" = next longer club above fullRow
  const fullIdx   = rows.indexOf(fullRow);
  const flightRow = rows.slice(0, fullIdx).reverse().find(r => r.diff > fullRow.diff) ?? null;

  document.getElementById('target-body').innerHTML = rows.map(r => {
    const isFull   = r === fullRow;
    const isFlight = r === flightRow;
    const trCls    = (isFull || isFlight) ? 'target-pick' : '';
    const badge    = isFull   ? '<span class="tt-badge full">Full</span>'
                   : isFlight ? '<span class="tt-badge flight">Flight</span>'
                   : '';
    return `<tr class="${trCls}">
      <td class="tt-club">${r.label}${badge}</td>
      <td class="tt-adj">${r.adj} yds</td>
      <td class="tt-diff ${r.cls}">${r.sign}${r.diff}</td>
    </tr>`;
  }).join('');
}

function initTargetCtrl() {
  const input = document.getElementById('target-display');
  input.value = state.targetYds;

  function bump(delta) {
    state.targetYds = Math.min(999, Math.max(1, state.targetYds + delta));
    input.value = state.targetYds;
    renderTarget();
    saveState();
  }

  document.getElementById('target-minus').addEventListener('click', () => bump(-1));
  document.getElementById('target-plus').addEventListener('click',  () => bump(+1));

  input.addEventListener('focus', () => input.select());
  input.addEventListener('input', () => {
    const val = parseInt(input.value, 10);
    if (!isNaN(val) && val >= 1 && val <= 999) {
      state.targetYds = val;
      renderTarget();
      saveState();
    }
  });
  input.addEventListener('blur', () => { input.value = state.targetYds; });
}

function renderAll() { renderCarryTable(); renderWedge(); renderTarget(); }

// ── Conditions ────────────────────────────────────────────────────────
function initCondCtrl(ctrlId, stateKey) {
  document.getElementById(ctrlId).addEventListener('click', e => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    document.querySelectorAll(`#${ctrlId} .seg-btn`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state[stateKey] = btn.dataset.val;
    renderAll();
    saveState();
  });
}
initCondCtrl('air-ctrl',      'air');
initCondCtrl('wind-ctrl',     'wind');
initCondCtrl('elev-ctrl',     'elev');
initCondCtrl('lie-ctrl',      'lie');
initTargetCtrl();

// ── Tabs ──────────────────────────────────────────────────────────────
  document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${btn.dataset.tab}`).classList.add('active');
});

// ── Club modal ────────────────────────────────────────────────────────
const modalScrim   = document.getElementById('modal-scrim');
const modalTitle   = document.getElementById('modal-title');
const modalHint    = document.getElementById('modal-hint');
const modalInput   = document.getElementById('modal-input');
const modalActions = document.getElementById('modal-actions');
let modalClubId    = null;

function openClubModal(id) {
  modalClubId = id;
  const club = CLUBS.find(c => c.id === id);
  modalTitle.textContent = club.label;
  modalHint.textContent  = `Set base carry for ${club.label}`;
  modalInput.value = state.carries[id] ?? SPEC[id];
  document.getElementById('modal-stepper-row').style.display = '';
  modalActions.innerHTML = `
    <button class="btn-secondary" id="modal-reset">Reset to bag</button>
    <button class="btn-primary" id="modal-save">Save</button>`;
  document.getElementById('modal-reset').addEventListener('click', () => {
    delete state.locked[modalClubId];
    state.carries = extrapolate(state.anchors.driver, state.anchors.fiveIron);
    saveState(); renderAll(); closeModal();
  });
  document.getElementById('modal-save').addEventListener('click', () => {
    const v = parseInt(modalInput.value, 10);
    if (!isNaN(v) && v > 0) {
      state.carries[modalClubId] = v;
      state.locked[modalClubId] = true;
      saveState(); renderAll(); closeModal();
    }
  });
  modalScrim.classList.add('open');
}

function closeModal() { modalScrim.classList.remove('open'); modalClubId = null; }

document.getElementById('modal-close').addEventListener('click', closeModal);
modalScrim.addEventListener('click', e => { if (e.target === modalScrim) closeModal(); });
document.getElementById('btn-minus').addEventListener('click', () => {
  const v = parseInt(modalInput.value, 10);
  if (!isNaN(v) && v > 1) modalInput.value = v - 1;
});
document.getElementById('btn-plus').addEventListener('click', () => {
  const v = parseInt(modalInput.value, 10);
  if (!isNaN(v)) modalInput.value = v + 1;
});

// ── Reset bag ─────────────────────────────────────────────────────────
document.getElementById('btn-settings').addEventListener('click', () => {
  modalTitle.textContent = 'Reset Bag?';
  modalHint.textContent  = `Anchors: Driver ${state.anchors?.driver} / 5i ${state.anchors?.fiveIron}. This will clear all custom carries.`;
  document.getElementById('modal-stepper-row').style.display = 'none';
  modalActions.innerHTML = `
    <button class="btn-secondary" id="modal-cancel">Cancel</button>
    <button class="btn-danger" id="modal-confirm-reset">Reset</button>`;
  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('modal-stepper-row').style.display = '';
    closeModal();
  });
  document.getElementById('modal-confirm-reset').addEventListener('click', () => {
    Object.assign(state, { isSetupComplete:false, anchors:null, carries:{}, locked:{} });
    document.getElementById('modal-stepper-row').style.display = '';
    saveState(); closeModal(); showSetup();
  });
  modalScrim.classList.add('open');
});

// ── Show/hide ─────────────────────────────────────────────────────────
function syncCondUI() {
  document.querySelectorAll('#air-ctrl .seg-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.val === state.air));
  document.querySelectorAll('#wind-ctrl .seg-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.val === state.wind));
  document.querySelectorAll('#elev-ctrl .seg-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.val === state.elev));
  document.querySelectorAll('#firmness-ctrl .seg-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.val === state.firmness));
  document.querySelectorAll('#lie-ctrl .seg-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.val === state.lie));
}

function showApp() {
  document.getElementById('setup-screen').classList.remove('active');
  document.getElementById('app').style.display = '';
  syncCondUI();
  renderAll();
}

function showSetup() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').classList.add('active');
  inputDriver.value = '';
  input5i.value = '';
  validateSetup();
}


// ── Boot ──────────────────────────────────────────────────────────────
initSetupListeners();
state.isSetupComplete ? showApp() : showSetup();

// ── Service worker (PWA) ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `const C='club-caddy-v3';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add('/')));self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(n=>n!==C).map(n=>caches.delete(n)))));self.clients.claim()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))})`;
  const url = URL.createObjectURL(new Blob([sw], {type:'application/javascript'}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
